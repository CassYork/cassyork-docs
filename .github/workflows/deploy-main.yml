name: Deploy main

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-linode-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "Missing secret DEPLOY_HOST" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Rsync repository (preserves server deploy/.env.linode)
        run: |
          USER="${DEPLOY_USER:-root}"
          DIR="${DEPLOY_REMOTE_DIR:-/opt/cassyork-docs}"
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=yes" \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude 'bin' \
            --exclude 'dist' \
            --exclude '*.sqlite3' \
            --exclude '.env' \
            --exclude 'deploy/.env.linode' \
            ./ "${USER}@${DEPLOY_HOST}:${DIR}/"

      - name: Docker Compose up + Goose migrations
        run: |
          USER="${DEPLOY_USER:-root}"
          DIR="${DEPLOY_REMOTE_DIR:-/opt/cassyork-docs}"
          ssh -o StrictHostKeyChecking=yes \
            "${USER}@${DEPLOY_HOST}" \
            "set -euo pipefail
             cd '${DIR}'
             docker compose --env-file deploy/.env.linode -f deploy/docker-compose.linode.yml up -d --build
             bash deploy/scripts/run-migrations-remote.sh"

      - name: Health check
        run: |
          curl -sfS --retry 5 --retry-delay 5 --retry-all-errors --max-time 60 \
            "http://${DEPLOY_HOST}:8095/healthz"
          echo
