version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/infrastructure/postgres/sql/schema.sql"
    queries: "internal/infrastructure/postgres/sql/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/infrastructure/postgres/sqlcgen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: false
        emit_empty_slices: true
